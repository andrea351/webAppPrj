<!DOCTYPE html>

<html lang="eng">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--WIDTH si adatta alla larghezza del dispositivo-->
        <title>Mood Cinema</title> 
        <link rel="stylesheet" href="barra_superiore.css"> <!--USA le FUNZIONI descritte in 'barra_superiore.css'-->
    </head>

    <body>
        <header class="pannello-superiore">
            <nav class="menu-sx"> <!--Uso NAV per indicare che sono i seguenti sono i LINK per NAVIGARE nel sito-->
                <a href="#contatti">CONTATTACI</a> <!--CREA dei LINK CLICCABILI-->
                <a href="#servizi">SERVIZI</a>
                <a href="#prezzi">PREZZI</a>
            </nav>
           
           <div class="logo-centro">
                <img src="logo.png" alt="Logo Cinema" class="img-logo">
           </div>
           
           <div class="menu-destra">
                <div class="contenitore-ricerca">  <!--Icona LENTE di INGRANDIMENTO per la barra di ricerca-->
                    <svg class="icona-lente" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" class="input-ricerca" placeholder="Cerca un film ...">
                </div>

                <button id="btn-profilo" class="bottone-profilo"> <!--Icona PROFILO-->
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </button>
            </div>
        </header>

        <hr style="width: 70%;"> <!-- LINEA SPAZIATRICE -->
    </body>

</html>
