<!DOCTYPE html>
<html lang="ita">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="pop-up_registrazione.css">
<title>Login</title>
</head>

<body>

<main>
    <div class="overlay" id="overlay">

        <div class="pop-up-contenuto">

            <!-- X chiudi -->
            <span class="chiudi" id="chiudi">&times;</span>

            <!-- Logo -->
            <div class="immagine-logo">
                <img src="logo.png" alt="cineMood">
            </div>

            <h3 class="testo-log-in">Accedi a CineMood</h3>

            <!-- Email -->
            <div class="campo">
                <input type="email" id="email" required>
                <label>indirizzo email</label>
            </div>

            <!-- Password -->
            <div class="campo">
                <input type="password" id="pwd" required>
                <label>password</label>
                <span class="show-pass" onclick="togglePassword()">👁</span>
            </div>

            <!-- Link password dimenticata -->
            <a href="recupero pswd.html" class="link-recupero-pswd">
                <strong>password dimenticata?</strong>
            </a>

            <!-- Bottone Login -->
            <button class="btn-login">Accedi</button>

            <!-- Separatore -->
            <div class="linea-con-testo">
                <hr>
                <span>oppure</span>
                <hr>
            </div>

            <!--BOTTONE CONTINUA CON GOOGLE-->

            <p class="noAccount">Non hai un account?</p>

            <!-- Bottone Sign-up -->
            <button class="btn-sign">Registrati</button>

        </div>

    </div>
</main>

<!-- Script -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    const overlay = document.getElementById("overlay");
    const chiudi = document.getElementById("chiudi");

    // Funzione chiudi popup con fade-out
    function closePopup() {
        overlay.classList.add("closing");
        setTimeout(() => overlay.style.display = "none", 300);
    }

    chiudi.onclick = closePopup;

    overlay.onclick = function(event){
        if(event.target === overlay){
            closePopup();
        }
    };
});

// Mostra/nascondi password
function togglePassword() {
    const pwd = document.getElementById("pwd");
    if(pwd.type === "password") pwd.type = "text";
    else pwd.type = "password";
}
</script>

</body>
</html>
