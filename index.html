<!DOCTYPE html>
<html lang="eng">
    <head>

        <link rel="stylesheet" href="style.css"> <!--usare le funzioni descritte in style.css-->
    </head>
    <body>
        <header class="pannello-superiore">
           <nav class="menu-sx"> <!--uso nav per indicare che sono i link per navigare nel sito-->
            <a href="#contatti">CONTATTACI</a> <!-- a crea i link cliccabili-->
            <a href="#servizi">PUNTI/SERVIZI</a>
            <a href="#prezzi">PREZZI</a>
           </nav>
           <div class="logo centro">
            <img src="Gemini_Generated_Image_p10dwnp10dwnp10d-removebg-preview.png" alt="logo cinema" class="img-logo">
           </div>
           <div class="menu-destra">

                </div> <!--input ricerca deve essere scritto uguale come in style.css-->

                <button id="btn-profilo" class="bottone-profilo"> <!--icona profilo omino-->
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
